<!DOCTYPE html>
<html lang="en">
<body>
  <h1>SplatMesh Core</h1>
  <canvas id="canvas" style="display:none"></canvas>
  <div id="status">Connecting...</div>
  <video id="video" autoplay playsinline muted></video>

  <script>
    const PC_IP = '10.91.53.25'; 
    const WS_PORT = 3000;
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    let ws;

    function connect() {
      ws = new WebSocket(`ws://${PC_IP}:${WS_PORT}/ws`);
      ws.binaryType = 'arraybuffer';
      ws.onopen = () => statusEl.textContent = 'Connected — Streaming';
      ws.onclose = () => { setTimeout(connect, 2000); statusEl.textContent = 'Disconnected'; };
    }

    function captureAndSend() {
      if (!ws || ws.readyState !== WebSocket.OPEN || !video.videoWidth) {
        requestAnimationFrame(captureAndSend);
        return;
      }

      // Calculate new dimensions
      const w = Math.round(video.videoWidth * 0.5);
      const h = Math.round(video.videoHeight * 0.5);

      // CRITICAL: Resize canvas to match the stream dimensions
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }

      ctx.drawImage(video, 0, 0, w, h);
      
      canvas.toBlob(blob => {
        if (blob && ws.readyState === WebSocket.OPEN) {
          blob.arrayBuffer().then(buf => ws.send(buf));
        }
        requestAnimationFrame(captureAndSend);
      }, 'image/jpeg', 0.85);
    }

    // Ask for 720p to get a better FOV than default
    navigator.mediaDevices.getUserMedia({ 
      video: { 
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      } 
    })
      .then(stream => {
        video.srcObject = stream;
        video.onloadedmetadata = () => { connect(); captureAndSend(); };
      });
  </script>
</body>
</html>
